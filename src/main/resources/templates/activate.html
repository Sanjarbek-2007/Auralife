<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auralife SSO - Verify Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="top-controls">
        <div class="custom-dropdown" id="lang-dropdown">
            <div class="dropdown-selected" onclick="toggleDropdown()">
                <span id="current-lang-icon">🌐</span>
                <span id="current-lang-text">English</span>
            </div>
            <div class="dropdown-options" id="lang-options">
                <div class="dropdown-option" onclick="changeLanguage('uz')">
                    <span class="flag">🇺🇿</span> <span th:text="#{lang.uz}">O'zbek</span>
                </div>
                <div class="dropdown-option" onclick="changeLanguage('en')">
                    <span class="flag">🇺🇸</span> English
                </div>
                <div class="dropdown-option" onclick="changeLanguage('ru')">
                    <span class="flag">🇷🇺</span> <span th:text="#{lang.ru}">Русский</span>
                </div>
                <div class="dropdown-option" onclick="changeLanguage('es')">
                    <span class="flag">🇪🇸</span> <span th:text="#{lang.es}">Español</span>
                </div>
                <div class="dropdown-option" onclick="changeLanguage('zh')">
                    <span class="flag">🇨🇳</span> <span th:text="#{lang.zh}">中文</span>
                </div>
                <div class="dropdown-option" onclick="changeLanguage('ja')">
                    <span class="flag">🇯🇵</span> <span th:text="#{lang.ja}">日本語</span>
                </div>
                <div class="dropdown-option" onclick="changeLanguage('ar')">
                    <span class="flag">🇸🇦</span> <span th:text="#{lang.ar}">العربية</span>
                </div>
            </div>
        </div>
        <div class="theme-switch-wrapper">
            <label class="theme-switch" for="theme-toggle">
                <input type="checkbox" id="theme-toggle" />
                <div class="slider round"></div>
            </label>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-header">
            <img id="auth-logo" th:src="@{/assets/auralife-logo-light-theme.png}" alt="Auralife Logo" class="auth-logo">
            <h1 th:text="#{activate.header}">Verify Account</h1>
            <p th:text="#{activate.subheader}">Enter the 6-digit code sent to your email</p>
        </div>

        <form id="activate-form">
                <input type="hidden" id="email" name="email" th:value="${email}">
            
            <div class="input-group">
                <label for="code" th:text="#{activate.code}">Verification Code</label>
                <input type="text" id="code" name="code" placeholder="123456" pattern="\d{6}" maxlength="6" required style="letter-spacing: 4px; font-size: 1.2rem; text-align: center;">
            </div>

            <button type="submit" class="btn-primary" th:text="#{activate.submit}">Verify & Login</button>
        </form>

        <div class="auth-footer" style="margin-top: 15px;">
            <a href="javascript:void(0)" onclick="resendCode()" th:text="#{activate.resend}">Didn't receive the code? Resend Code</a>
        </div>
    </div>

    <script th:src="@{/js/auth.js}"></script>
</body>
</html>
